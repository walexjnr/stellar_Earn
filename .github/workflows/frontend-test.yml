name: Frontend Tests

on:
  pull_request:
    branches: [main, master]
    paths:
      - "FrontEnd/**"
      - ".github/workflows/frontend-test.yml"

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEnd/my-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('FrontEnd/my-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache Vitest transform cache
        uses: actions/cache@v4
        with:
          path: FrontEnd/my-app/node_modules/.vite/vitest
          key: ${{ runner.os }}-vitest-${{ hashFiles('FrontEnd/my-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vitest-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
